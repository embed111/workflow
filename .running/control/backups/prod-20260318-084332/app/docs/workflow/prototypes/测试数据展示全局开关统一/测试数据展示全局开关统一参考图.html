<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>测试数据展示全局开关统一参考图</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d9dde3;
      --text: #1f2329;
      --muted: #667085;
      --accent: #1f6feb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f8fafc, var(--bg));
      color: var(--text);
      font: 14px/1.6 "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .wrap {
      width: min(1200px, calc(100vw - 32px));
      margin: 24px auto 40px;
    }
    .hero,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }
    .hero {
      padding: 20px 22px;
      margin-bottom: 18px;
    }
    h1, h2, p { margin: 0; }
    h1 { font-size: 24px; line-height: 1.2; }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .card {
      overflow: hidden;
    }
    .card-body {
      padding: 16px 18px 18px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      border-top: 1px solid var(--line);
      background: #f7f8fa;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>测试数据展示全局开关统一参考图</h1>
      <p class="meta">主题对应：`需求详情-测试数据展示全局开关统一.md`。本页展示设置页中该开关的关闭态与开启态，用于辅助后续继续核对“统一入口、训练中心、看板联动”的页面口径；不替代完整 AC 闭环结论。</p>
    </section>

    <section class="grid">
      <article class="card">
        <div class="card-body">
          <div class="tag">当前运行态截图</div>
          <h2>关闭态</h2>
          <p class="desc">当前页面设置为不展示测试数据时的设置页状态。</p>
        </div>
        <img src="./测试数据展示全局开关统一参考图-关闭态.png" alt="测试数据展示全局开关统一参考图-关闭态" />
      </article>

      <article class="card">
        <div class="card-body">
          <div class="tag">当前运行态截图</div>
          <h2>开启态</h2>
          <p class="desc">当前页面切到展示测试数据后的设置页状态。</p>
        </div>
        <img src="./测试数据展示全局开关统一参考图-开启态.png" alt="测试数据展示全局开关统一参考图-开启态" />
      </article>
    </section>
  </div>
</body>
</html>
